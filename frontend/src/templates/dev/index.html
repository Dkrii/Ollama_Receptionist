<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Receptionist Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/dev/dev.css?v=20260429-2" />
</head>
<body>
  <main id="kioskRoot" class="kiosk-container">
    <header class="kiosk-topbar" aria-label="Status deteksi wajah">
      <div class="kiosk-logo" aria-label="Akebono">
        <img src="/static/dev/models/logo_akebono_nobg.png" alt="AKEBONO" style="height: 50px; object-fit: contain;">
      </div>
      <div id="faceIndicator" class="kiosk-face-indicator is-searching" role="status" aria-live="polite">
        <span class="kiosk-face-indicator__dot" aria-hidden="true"></span>
        <span id="faceIndicatorText">Mencari wajah...</span>
      </div>
    </header>

    <div class="kiosk-bg" aria-hidden="true">
      <div class="kiosk-bg__image"></div>
      <div class="kiosk-bg__overlay"></div>
      <span class="kiosk-bg__orb kiosk-bg__orb--teal"></span>
      <span class="kiosk-bg__orb kiosk-bg__orb--gold"></span>
      <span class="kiosk-bg__orb kiosk-bg__orb--violet"></span>
    </div>

    <section class="kiosk-stage" aria-hidden="true">
      <div class="kiosk-stage__halo"></div>
      <div class="kiosk-stage__floor"></div>
      <div id="kioskAvatar" class="kiosk-avatar" role="img" aria-label="Virtual Receptionist" data-state="IDLE">
        <img src="/static/dev/models/IDLE5.png" class="avatar-img" data-state-id="IDLE" alt="idle" />
        <img src="/static/dev/models/LISTENING5.png" class="avatar-img" data-state-id="LISTENING" alt="listening" />
        <img src="/static/dev/models/THINKING5.png" class="avatar-img" data-state-id="THINGKING" alt="thinking" />
        <img src="/static/dev/models/TALKING5.png" class="avatar-img" data-state-id="TALKING" alt="talking" />
      </div>
      <video id="faceCamera" class="kiosk-camera" autoplay muted playsinline></video>
    </section>

    <section id="chatTray" class="kiosk-chat-tray" aria-live="polite" aria-label="Percakapan virtual receptionist">
      <div id="chatBox" class="chat-history" aria-live="polite"></div>
    </section>

    <div id="voiceIndicator" class="voice-indicator" aria-hidden="true">
      <span class="voice-bar"></span>
      <span class="voice-bar"></span>
      <span class="voice-bar"></span>
      <span class="voice-bar"></span>
      <span class="voice-bar"></span>
    </div>

    {% if app_env == 'development' %}
    <section id="debugRuntime" class="kiosk-debug" aria-live="polite" aria-label="Runtime debug info"></section>
    <ul id="debugStats" hidden></ul>
    {% endif %}
  </main>

  <script type="module" src="/static/dev/dev.js?v=20260429-6"></script>
</body>
</html>
