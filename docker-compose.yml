services:
  chroma:
    image: chromadb/chroma:0.5.23
    container_name: kiosk-chroma
    restart: unless-stopped
    volumes:
      - vector_data:/chroma/chroma
    networks:
      - kiosk-net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: kiosk-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KNOWLEDGE_DIR: /workspace/knowledge
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    depends_on:
      chroma:
        condition: service_started
    volumes:
      - ./app:/app
      - ./knowledge:/workspace/knowledge
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - kiosk-net

volumes:
  vector_data:

networks:
  kiosk-net:
    driver: bridge
