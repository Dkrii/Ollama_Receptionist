<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Receptionist Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/dev/dev.css?v=20260416-4" />
</head>
<body>
  <main id="kioskRoot" class="kiosk-container">
    <header class="kiosk-topbar" aria-label="Status deteksi wajah">
      <div class="kiosk-logo" aria-label="Akebono">AKEBONO</div>
      <div id="faceIndicator" class="kiosk-face-indicator is-searching" role="status" aria-live="polite">
        <span class="kiosk-face-indicator__dot" aria-hidden="true"></span>
        <span id="faceIndicatorText">Mencari wajah...</span>
      </div>
    </header>

    <div class="kiosk-bg" aria-hidden="true">
      <div class="kiosk-bg__image"></div>
      <div class="kiosk-bg__overlay"></div>
      <span class="kiosk-bg__orb kiosk-bg__orb--teal"></span>
      <span class="kiosk-bg__orb kiosk-bg__orb--gold"></span>
      <span class="kiosk-bg__orb kiosk-bg__orb--violet"></span>
    </div>

    <section class="kiosk-stage" aria-hidden="true">
      <div class="kiosk-stage__halo"></div>
      <div class="kiosk-stage__floor"></div>
      <img id="kioskAvatar" src="/static/kiosk/models/IDLE.png" alt="Virtual Receptionist" class="kiosk-avatar" />
      <video id="faceCamera" class="kiosk-camera" autoplay muted playsinline></video>
    </section>

    <section id="chatTray" class="kiosk-chat-tray" aria-live="polite" aria-label="Percakapan virtual receptionist">
      <div id="chatBox" class="chat-history" aria-live="polite"></div>
    </section>

    <section id="callPanel" class="dev-call-panel" aria-live="polite" aria-label="Status panggilan" hidden>
      <div class="dev-call-panel__eyebrow">Sambungan resepsionis</div>
      <h2 id="callPanelTitle" class="dev-call-panel__title">Belum ada sambungan aktif</h2>
      <p id="callPanelStatus" class="dev-call-panel__status">Saat pengunjung setuju untuk dihubungkan, status sambungan akan muncul di sini sebagai informasi pasif.</p>
    </section>

    <section id="debugRuntime" class="kiosk-debug" aria-live="polite" aria-label="Runtime debug info"></section>
    <ul id="debugStats" hidden></ul>
  </main>

  <script src="/static/vendor/twilio/voice-sdk/twilio.min.js?v=2.18.1"></script>
  <script src="/static/dev/dev.js?v=20260416-5"></script>
</body>
</html>
