services:
  chroma:
    image: chromadb/chroma:0.5.23
    container_name: vr-chroma
    restart: unless-stopped
    volumes:
      - vector_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - vr-net

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: vr-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_MSSQL_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - vr-net
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "${DB_MSSQL_USER}",
          "-P",
          "${DB_MSSQL_PASSWORD}",
          "-C",
          "-Q",
          "SELECT 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vr-app
    restart: unless-stopped
    env_file:
      - .env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      KNOWLEDGE_DIR: /workspace/knowledge
      FRONTEND_SRC_DIR: /frontend/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      chroma:
        condition: service_healthy
      mssql:
        condition: service_healthy
    volumes:
      - ./backend/app:/app
      - ./frontend/src:/frontend/src
      - ./knowledge:/workspace/knowledge
      - ./runtime:/workspace/runtime
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - vr-net

volumes:
  vector_data:
  mssql_data:

networks:
  vr-net:
    name: vr-net
    driver: bridge
